<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 414" role="img" aria-label="Anatomy of a personal agent harness: a proactive layer and a messaging bridge sit side by side at the top; both point down at an ephemeral agent below, which reads and writes a persistent memory store at the base.">
  <defs>
    <radialGradient id="bg" cx="50%" cy="6%" r="90%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="72%" stop-color="#e7edf1"/>
    </radialGradient>
    <style>
      .svg-root { font-family: ui-monospace, "Cascadia Code", "Cascadia Mono", "SF Mono", Menlo, Consolas, monospace; }
      .s-title { fill: #1b2632; font-size: 14px; font-weight: 600; }
      .s-sub   { fill: #5b6a77; font-size: 11.5px; }
      .s-tick  { fill: #5b6a77; font-size: 11px; letter-spacing: 0.04em; }
      .s-cy { fill: #0c8296; } .s-am { fill: #c8620a; } .s-vi { fill: #6a4bd0; }
      .box { fill: #ffffff; stroke: #c7d2dc; stroke-width: 1.5; }
      .box.bridge { stroke: #97c4cf; }
      .box.optional { stroke-dasharray: 6 5; }
      .box.agent { stroke: #c8620a; }
      .box.memory { stroke: #6a4bd0; }
      .ghost { fill: none; stroke: #c8620a; stroke-width: 1.5; opacity: .2; }
      .chip { fill: #eef3f7; stroke: #c7d2dc; stroke-width: 1; }
      .conn { stroke-width: 1.7; fill: none; }
      .conn.trig { stroke: #0c8296; }
      .conn.mem { stroke: #6a4bd0; }
      .live { fill: #0c8296; }
    </style>
  </defs>

  <g class="svg-root">
    <rect x="0" y="0" width="800" height="414" fill="url(#bg)"/>

    <!-- ===== TOP ROW: two entry points ===== -->
    <rect class="box optional" x="60" y="36" width="330" height="96" rx="12"/>
    <text x="84" y="66" class="s-title">proactive layer</text>
    <text x="366" y="66" text-anchor="end" class="s-sub">optional</text>
    <rect class="chip" x="84" y="84" width="62" height="26" rx="7"/>
    <text x="115" y="101" text-anchor="middle" class="s-tick s-am">cron</text>
    <rect class="chip" x="152" y="84" width="92" height="26" rx="7"/>
    <text x="198" y="101" text-anchor="middle" class="s-tick s-am">heartbeat</text>

    <rect class="box bridge" x="410" y="36" width="330" height="96" rx="12"/>
    <circle class="live" cx="434" cy="60" r="4"/>
    <text x="450" y="66" class="s-title">messaging bridge</text>
    <text x="716" y="62" text-anchor="end" class="s-tick s-cy">● live</text>
    <text x="434" y="96" class="s-tick s-cy">watches Discord / Telegram → wakes the agent</text>

    <!-- triggers point straight down at the agent -->
    <line class="conn trig" x1="225" y1="134" x2="225" y2="174"/>
    <path class="s-cy" d="M221 174 L229 174 L225 182 Z"/>
    <line class="conn trig" x1="575" y1="134" x2="575" y2="174"/>
    <path class="s-cy" d="M571 174 L579 174 L575 182 Z"/>
    <text x="400" y="162" text-anchor="middle" class="s-tick s-cy">any trigger wakes the agent</text>

    <!-- ===== AGENT (ephemeral) ===== -->
    <rect class="ghost" x="72" y="190" width="656" height="86" rx="12"/>
    <rect class="ghost" x="66" y="186" width="668" height="86" rx="12"/>
    <rect class="box agent" x="60" y="182" width="680" height="86" rx="12"/>
    <text x="84" y="218" class="s-title s-am">agent</text>
    <text x="84" y="242" class="s-sub">ephemeral — no process alive between triggers, ≈ 0 idle cost</text>
    <rect class="chip" x="598" y="203" width="122" height="26" rx="8" style="stroke:#c8620a"/>
    <text x="659" y="220" text-anchor="middle" class="s-tick s-am">spawns · exits</text>

    <!-- read / write to memory -->
    <line class="conn mem" x1="370" y1="270" x2="370" y2="296"/>
    <path class="s-vi" d="M366 296 L374 296 L370 304 Z"/>
    <line class="conn mem" x1="430" y1="302" x2="430" y2="276"/>
    <path class="s-vi" d="M426 276 L434 276 L430 268 Z"/>
    <text x="400" y="291" text-anchor="middle" class="s-tick s-vi">read · write</text>

    <!-- ===== PERSISTENT MEMORY ===== -->
    <rect class="box memory" x="60" y="304" width="680" height="90" rx="12"/>
    <g transform="translate(84,328)">
      <ellipse cx="14" cy="0" rx="14" ry="5" fill="none" stroke="#6a4bd0" stroke-width="1.5"/>
      <path d="M0 0 v22 a14 5 0 0 0 28 0 v-22" fill="none" stroke="#6a4bd0" stroke-width="1.5"/>
      <path d="M0 11 a14 5 0 0 0 28 0" fill="none" stroke="#6a4bd0" stroke-width="1.2" opacity=".7"/>
    </g>
    <text x="128" y="338" class="s-title s-vi">persistent memory</text>
    <text x="128" y="360" class="s-sub">your context across sessions — so every message isn't a cold start</text>
    <text x="128" y="380" class="s-sub">vault notes · memory files · prior threads</text>
  </g>
</svg>
