<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="800" height="320" role="img" aria-label="Cutaway of a DigitalOcean droplet running NanoClaw: a phone messages in over Discord or Telegram, an always-on messaging bridge sits above a Docker isolation layer where an ephemeral agent spawns in its own container, and the Obsidian knowledge base is bind-mounted alongside as persistent memory.">
  <style>
    .t-label { font-family: -apple-system, system-ui, "Segoe UI", Roboto, sans-serif; font-weight: 600; font-size: 15px; }
    .t-sub { font-family: ui-monospace, "SF Mono", "Cascadia Code", Menlo, Consolas, monospace; font-size: 12px; letter-spacing: 0.02em; }
    .t-tiny { font-family: ui-monospace, "SF Mono", "Cascadia Code", Menlo, Consolas, monospace; font-size: 11px; letter-spacing: 0.02em; }
  </style>
  <defs>
    <marker id="aB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#0069FF"/></marker>
    <marker id="aV" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#8256F0"/></marker>
    <radialGradient id="gem" cx="0.5" cy="0.4" r="0.7"><stop offset="0" stop-color="#B49BFF"/><stop offset="1" stop-color="#8256F0"/></radialGradient>
    <symbol id="phone" viewBox="0 0 64 100">
      <rect x="8" y="4" width="48" height="92" rx="9" fill="#FFFFFF" stroke="#1A2230" stroke-width="2.5"/>
      <rect x="14" y="14" width="36" height="66" rx="3" fill="#EEF1F7"/>
      <path d="M22 30 h26 a5 5 0 0 1 5 5 v12 a5 5 0 0 1 -5 5 H33 l-9 8 v-8 h-2 a5 5 0 0 1 -5 -5 V35 a5 5 0 0 1 5 -5 z" fill="#5865F2"/>
      <circle cx="32" cy="88" r="3" fill="#1A2230" opacity="0.5"/>
    </symbol>
    <symbol id="drop" viewBox="0 0 100 100"><path d="M50 6 C68 34 86 50 86 66 A36 36 0 1 1 14 66 C14 50 32 34 50 6 z" fill="#0069FF"/><path d="M50 6 C68 34 86 50 86 66 A36 36 0 0 1 50 102 z" fill="#000" opacity="0.10"/></symbol>
    <symbol id="gemi" viewBox="0 0 100 100">
      <polygon points="50,6 84,30 84,64 50,94 16,64 16,30" fill="url(#gem)"/>
      <polygon points="50,6 84,30 50,44 16,30" fill="#fff" opacity="0.22"/>
      <polygon points="50,44 84,30 84,64 50,94" fill="#000" opacity="0.14"/>
      <line x1="50" y1="44" x2="50" y2="94" stroke="#fff" stroke-width="1.4" opacity="0.4"/>
      <line x1="16" y1="30" x2="50" y2="44" stroke="#fff" stroke-width="1.4" opacity="0.4"/>
      <line x1="84" y1="30" x2="50" y2="44" stroke="#fff" stroke-width="1.4" opacity="0.4"/>
    </symbol>
    <symbol id="box" viewBox="0 0 100 100"><rect x="8" y="20" width="84" height="60" rx="7" fill="#FFFFFF" stroke="#0069FF" stroke-width="2.5"/><line x1="8" y1="38" x2="92" y2="38" stroke="#0069FF" stroke-width="2"/><circle cx="20" cy="29" r="2.6" fill="#0069FF"/><circle cx="30" cy="29" r="2.6" fill="#0069FF"/></symbol>
    <symbol id="spark" viewBox="0 0 100 100"><path d="M50 8 L60 40 L92 50 L60 60 L50 92 L40 60 L8 50 L40 40 z" fill="#F0921C"/></symbol>
  </defs>

  <rect x="0" y="0" width="800" height="320" rx="18" fill="#EEF1F7"/>

  <use href="#phone" x="26" y="122" width="58" height="90"/>
  <text class="t-sub" x="55" y="228" text-anchor="middle" fill="#5A6577">via Discord</text>
  <text class="t-sub" x="55" y="244" text-anchor="middle" fill="#5A6577">/ Telegram</text>

  <path d="M90 150 H206" fill="none" stroke="#0069FF" stroke-width="2" marker-end="url(#aB)"/>
  <text class="t-tiny" x="148" y="142" text-anchor="middle" fill="#8A93A3">message</text>
  <path d="M206 184 H92" fill="none" stroke="#0069FF" stroke-width="2" marker-end="url(#aB)"/>
  <text class="t-tiny" x="149" y="200" text-anchor="middle" fill="#8A93A3">reply</text>

  <rect x="214" y="48" width="326" height="224" rx="18" fill="#FFFFFF" stroke="#D3D9E4" stroke-width="1.5"/>
  <use href="#drop" x="230" y="60" width="24" height="24"/>
  <text class="t-label" x="262" y="78" fill="#1A2230">DigitalOcean droplet</text>
  <text class="t-sub" x="262" y="94" fill="#5A6577">NanoClaw harness</text>

  <rect x="232" y="110" width="290" height="44" rx="9" fill="#5865F2" opacity="0.14"/>
  <circle cx="250" cy="132" r="5" fill="#5865F2"/>
  <text class="t-label" x="266" y="128" font-size="14" fill="#1A2230">Messaging bridge</text>
  <text class="t-tiny" x="266" y="145" fill="#5865F2">always on</text>

  <rect x="232" y="164" width="290" height="96" rx="9" fill="#0069FF" opacity="0.10"/>
  <text class="t-tiny" x="244" y="182" fill="#0069FF">Docker isolation · 1 container / session</text>
  <use href="#box" x="244" y="194" width="62" height="48"/>
  <use href="#box" x="318" y="194" width="62" height="48"/>
  <use href="#box" x="392" y="194" width="62" height="48"/>
  <use href="#spark" x="335" y="188" width="32" height="32"/>
  <text class="t-tiny" x="349" y="256" text-anchor="middle" fill="#8A93A3">agent</text>
  <text class="t-tiny" x="490" y="208" text-anchor="middle" fill="#8A93A3">spawns,</text>
  <text class="t-tiny" x="490" y="222" text-anchor="middle" fill="#8A93A3">works,</text>
  <text class="t-tiny" x="490" y="236" text-anchor="middle" fill="#8A93A3">exits</text>

  <use href="#gemi" x="660" y="118" width="84" height="84"/>
  <path d="M546 172 H654" fill="none" stroke="#8256F0" stroke-width="2" marker-end="url(#aV)" marker-start="url(#aV)"/>
  <text class="t-tiny" x="600" y="152" text-anchor="middle" fill="#8256F0">reads + writes</text>
  <text class="t-tiny" x="600" y="165" text-anchor="middle" fill="#8256F0">via bind mount</text>
  <text class="t-label" x="702" y="224" text-anchor="middle" font-size="14" fill="#1A2230">Obsidian vault</text>
  <text class="t-tiny" x="702" y="241" text-anchor="middle" fill="#8A93A3">Knowledge base in</text>
  <text class="t-tiny" x="702" y="255" text-anchor="middle" fill="#8A93A3">markdown text</text>
</svg>
